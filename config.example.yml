# Jupi D2C 配置示例。
# 复制为 config.yml（cp config.example.yml config.yml）后填好 token 即可，
# 或直接运行二进制：首次启动会自动生成默认 config.yml 并打印随机 token。
# 所有字段均可覆盖；config.yml 为配置的唯一来源（无环境变量 / .env 兜底）。

port: 5678
# 客户端访问 token。留空启动会报错；自动生成时会填入 64 位随机十六进制串。
token: "d2c-local-test-token-7f3a9c1e5b2d4068"
# 上传落盘目录。相对路径锚定到本配置文件所在目录，而非进程工作目录。
upload_dir: "./uploads"
# SQLite 数据库文件（存放生成的 AST design）。同样锚定到本配置文件所在目录，
# 因此天然区分开发（./）与生产（~/.jupi-d2c/）环境。
db_path: "jupi-d2c.db"
max_file_size: 10485760
worker_count: 4
queue_size: 64
